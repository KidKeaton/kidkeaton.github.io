en: &DEFAULT_EN
  header:
    title: Automation That Ships
    text: "Milliarium AI designs production-ready agents, workflows, and integrations tailored to how your team works."
    button: Explore Capabilities
    buttonlink: "#services"

  services:
    title: "Capabilities"
    text: "Implementation-first support from strategy to shipped automation."
    section: services
    list:
      - title: "Autonomous Agents"
        desc: "Design and deploy agents that manage outreach, reporting, and internal operations with transparency and human-in-the-loop checkpoints."
        icon: fas fa-robot
      - title: "Workflow Automation"
        desc: "Map your business processes into resilient automations using n8n, custom scripts, and API orchestration."
        icon: fas fa-cogs
      - title: "Cloud Deployment"
        desc: "Hardened infrastructure and observability on Railway, Fly.io, or AWS so every task runs reliably at scale."
        icon: fas fa-cloud-upload-alt

  portfolio:
    title: "Recent Work"
    text: "Select engagements showcasing automation, agent ops, and workflow engineering."
    section: portfolio
    closebutton: "Close Project"

  clients:
    title: "Teams We Support"
    text: "Operators and founders who trust Milliarium to keep their systems humming."
    section: clients
    max-height: 90px
    horizontal-scrolling: "" #"yes/no"
    list:
      - title: "Growth-Stage SaaS"
        url: https://www.milliarium.me
        logo: assets/img/clients/envato.jpg
      - title: "Operations Teams"
        url: https://www.milliarium.me
        logo: assets/img/clients/designmodo.jpg
      - title: "Consultancies"
        url: https://www.milliarium.me
        logo: assets/img/clients/creative-market.jpg

  contact:
    title: "Tell Us About Your Workflow"
    text: "Ready to automate a process or deploy an agent? Drop a note and we’ll schedule a working session."
    section: contact
    name: "Name*"
    name-validation: "Please enter your name."
    email: "Email*"
    email-validation: "Please enter your email address."
    phone: "Phone Number"
    phone-validation: "Please enter your phone number."
    message: "Message*"
    message-validation: "Please enter a message."
    subject: "Milliarium AI Request"
    submit: "Send Inquiry"

  footer:
    legal: "Privacy & Terms"
    social:
      - url: https://www.linkedin.com/in/lewis-kim/
        icon: "fab fa-linkedin-in"
      - url: https://github.com/KidKeaton
        icon: "fab fa-github"
      - url: mailto:business@milliarium.me
        icon: "fas fa-envelope"
