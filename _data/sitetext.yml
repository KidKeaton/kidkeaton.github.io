ko:
  header:
    title: "바로 실행되는 자동화"
    text: "Milliarium AI는 팀의 업무 흐름에 맞춘 프로덕션급 에이전트와 자동화를 설계하고 구축합니다."
    button: "서비스 살펴보기"
    buttonlink: "#services"

  services:
    title: "서비스"
    text: "전략 수립부터 프로덕션 배포까지 한 번에 지원합니다."
    section: services
    list:
      - title: "자율형 에이전트"
        desc: "아웃리치, 리포트, 내부 운영을 투명하게 관리하고 휴먼 인더 루프 검증을 갖춘 에이전트를 설계합니다."
        icon: fas fa-robot
      - title: "워크플로 자동화"
        desc: "n8n, 커스텀 스크립트, API 오케스트레이션으로 반복 업무를 견고한 자동화 파이프라인으로 전환합니다."
        icon: fas fa-cogs
      - title: "클라우드 배포"
        desc: "Railway, Fly.io, AWS 환경에서 관측성과 안정성을 확보한 인프라를 구성해 확장 가능한 실행력을 제공합니다."
        icon: fas fa-cloud-upload-alt

  portfolio:
    title: "주요 프로젝트"
    text: "자동화, 에이전트 운영, 워크플로 엔지니어링 사례를 살펴보세요."
    section: portfolio
    closebutton: "프로젝트 닫기"

  timeline:
    title: "마일스톤"
    text: "지속 가능한 자동화를 구축하며 쌓아온 여정입니다."
    section: timeline
    events:
      - title: "첫 자동화 배포"
        year: "2022"
        desc: "SaaS 창업팀을 위해 리드 enrichment와 일일 리포팅을 자동화하여 수시간의 수작업을 절감했습니다."
        image: assets/img/timeline/1.jpg
        alt:
      - title: "Milliarium 설립"
        year: "2023"
        desc: "재사용 가능한 자동화 프레임워크와 기술 구현, 지속적인 최적화를 제공하기 위해 Milliarium AI를 설립했습니다."
        image: assets/img/timeline/2.jpg
        alt:
      - title: "에이전트 플레이북 구축"
        year: "2024"
        desc: "감사 로그와 성능 인사이트를 갖춘 에이전트 기반 온보딩·아웃리치 파이프라인을 구현했습니다."
        image: assets/img/timeline/3.jpg
        alt: "AI 에이전트 대시보드 화면"
      - title: "스케일링 파트너십"
        year: "2025"
        desc: "운영팀과 협업하여 자동화를 인프라로 내재화하고, 사람과 AI가 조화롭게 협업하는 시스템을 확장했습니다."
        image: assets/img/timeline/4.jpg
        alt:
        align: right
    end: "함께 다음 <br> 마일스톤을 <br> 만들어봐요."

  about:
    title: "진행 방식"
    text: "사람 중심 자동화"
    body: "창업자와 운영팀의 문제를 함께 정의하고, 기존 프로세스를 존중하는 자동화를 설계한 뒤 팀에 자연스럽게 녹아들 때까지 반복합니다. 발견 워크숍부터 런북 제공, 운영 지원까지 명확하고 빠른 실행을 지향합니다."
    section: about

  clients:
    title: "함께하는 팀"
