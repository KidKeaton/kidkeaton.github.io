    section: clients
    max-height: 90px
    horizontal-scrolling: ""
    list:
      - title: "성장 단계 SaaS"
        url: https://www.milliarium.me
        logo: assets/img/clients/envato.jpg
      - title: "운영 팀"
        url: https://www.milliarium.me
        logo: assets/img/clients/designmodo.jpg
      - title: "컨설팅 파트너"
        url: https://www.milliarium.me
        logo: assets/img/clients/creative-market.jpg

  contact:
    title: "워크플로를 알려주세요"
    text: "자동화하거나 에이전트를 도입하고 싶은 프로세스가 있다면 메시지를 남겨주세요. 작업 세션을 예약해드립니다."
