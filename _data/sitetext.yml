en: &DEFAULT_EN
  header:
    title: Automation That Ships
    text: "Milliarium AI designs production-ready agents, workflows, and integrations tailored to how your team works."
    button: Explore Capabilities
    buttonlink: "#services"

  services:
    title: "Capabilities"
    text: "Implementation-first support from strategy to shipped automation."
    section: services
    list:
      - title: "Autonomous Agents"
        desc: "Design and deploy agents that manage outreach, reporting, and internal operations with transparency and human-in-the-loop checkpoints."
        icon: fas fa-robot
      - title: "Workflow Automation"
        desc: "Map your business processes into resilient automations using n8n, custom scripts, and API orchestration."
        icon: fas fa-cogs
      - title: "Cloud Deployment"
        desc: "Hardened infrastructure and observability on Railway, Fly.io, or AWS so every task runs reliably at scale."
        icon: fas fa-cloud-upload-alt

  portfolio:
    title: "Recent Work"
    text: "Select engagements showcasing automation, agent ops, and workflow engineering."
    section: portfolio
    closebutton: "Close Project"

  timeline:
    title: "Milestones"
    text: "Key steps in delivering durable automation programs."
    section: timeline
    # left is the default
    #start_align: "left"
    events:
      - title: "First Automations Shipped"
        year: "2022"
        desc: "Led rapid experiments that automated daily reporting and lead enrichment for SaaS founders, freeing teams from hours of manual data wrangling."
        image: assets/img/timeline/1.jpg
        alt:
      - title: "Milliarium Launch"
        year: "2023"
        desc: "Formalized Milliarium AI to offer repeatable automation frameworks, technical implementation, and ongoing optimization for growth-minded teams."
        image: assets/img/timeline/2.jpg
        alt:
      - title: "Agent Playbooks"
        year: "2024"
        desc: "Delivered agent-powered outreach and onboarding pipelines with full audit trails, safeguards, and performance insights."
        image: assets/img/timeline/3.jpg
        alt: "Walkthrough of an AI agent dashboard"
      - title: "Scaling Partnerships"
        year: "2025"
        desc: "Partnering with operations teams to embed automation as infrastructure, blending human expertise with resilient AI systems."
        image: assets/img/timeline/4.jpg
        alt:
        # you can enforce the alignment
        align: right
    end: "Let’s Build <br> Your Next <br> Milestone."

  about:
    title: "Approach"
    text: "Human-centered automation"
    body: "We partner with founders and operators to uncover friction, design automation that respects existing processes, and iterate until it feels native to the team. From discovery workshops to launch-day runbooks, every engagement is built for clarity, speed, and the right mix of human oversight."
    section: about

  clients:
    title: "Teams We Support"
    text: "Operators and founders who trust Milliarium to keep their systems humming."
    section: clients
    max-height: 90px
    horizontal-scrolling: "" #"yes/no"
    list:
      - title: "Growth-Stage SaaS"
        url: https://www.milliarium.me
        logo: assets/img/clients/envato.jpg
      - title: "Operations Teams"
        url: https://www.milliarium.me
        logo: assets/img/clients/designmodo.jpg
      - title: "Consultancies"
        url: https://www.milliarium.me
        logo: assets/img/clients/creative-market.jpg

  team:
    title: "Meet the Team"
    text: "Hands-on builders focused on measurable outcomes."
    subtext: "Milliarium AI is led by technologists who have shipped production systems across startups and enterprise teams."
    section: team
    people:
      - name: "Lewis Kim"
        role: "Founder & Automation Architect"
        image: assets/img/team/1.jpg
        social:
          - url: https://www.linkedin.com/in/lewis-kim/
            icon: fab fa-linkedin-in
          - url: https://github.com/KidKeaton
            icon: fab fa-github
          - url: mailto:business@milliarium.me
            icon: fas fa-envelope

  contact:
    title: "Tell Us About Your Workflow"
    text: "Ready to automate a process or deploy an agent? Drop a note and we’ll schedule a working session."
    section: contact
    name: "Name*"
    name-validation: "Please enter your name."
    email: "Email*"
    email-validation: "Please enter your email address."
    phone: "Phone Number"
    phone-validation: "Please enter your phone number."
    message: "Message*"
    message-validation: "Please enter a message."
    subject: "Milliarium AI Request"
    submit: "Send Inquiry"

  footer:
    legal: "Privacy & Terms"
    social:
      - url: https://www.linkedin.com/in/lewis-kim/
        icon: "fab fa-linkedin-in"
      - url: https://github.com/KidKeaton
        icon: "fab fa-github"
      - url: mailto:business@milliarium.me
        icon: "fas fa-envelope"
