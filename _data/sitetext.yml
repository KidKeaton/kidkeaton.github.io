        logo: assets/img/clients/designmodo.jpg
      - title: "컨설팅 파트너"
        url: https://www.milliarium.me
        logo: assets/img/clients/creative-market.jpg

  team:
    title: "팀 소개"
    text: "정량적 성과에 집중하는 실무 빌더들입니다."
    subtext: "Milliarium AI는 스타트업과 엔터프라이즈에서 프로덕션 시스템을 구축해 온 기술 리더들이 이끌고 있습니다."
    section: team
    people:
      - name: "Lewis Kim"
        role: "창업자 · 자동화 아키텍트"
        image: assets/img/team/1.jpg
        social:
          - url: https://www.linkedin.com/in/lewis-kim/
            icon: fab fa-linkedin-in
          - url: https://github.com/KidKeaton
            icon: fab fa-github
